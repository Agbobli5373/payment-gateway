# Started automatically when running the app locally (spring-boot-docker-compose).
# Uses the same DB name/user/password as application.yml defaults.
# Disable with: spring.docker.compose.enabled=false (or if you already run Postgres on 5432).
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: paygateway
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgsecret
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pguser -d paygateway"]
      interval: 3s
      timeout: 5s
      retries: 10
