# Env vars (PRD §10.3): DB_URL, DB_USERNAME, DB_PASSWORD, JWT_SECRET, JWT_EXPIRY_SECONDS,
# RATE_LIMIT_RPM, RECONCILE_CRON. Use SPRING_PROFILES_ACTIVE=docker inside Compose.
#
# Local IDE: working directory should be the payment-gateway module (compose.yaml).
# Disable auto Postgres: spring.docker.compose.enabled=false

spring:
  application:
    name: payment-gateway
  docker:
    compose:
      enabled: true
      file: compose.yaml
      readiness:
        timeout: PT120S
      lifecycle-management: start-and-stop
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/paygateway}
    username: ${DB_USERNAME:pguser}
    password: ${DB_PASSWORD:pgsecret}
    hikari:
      maximum-pool-size: 10
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

# OpenAPI 3 + Swagger UI (local/testing — restrict or disable in production if needed)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# JWT + in-memory users ({noop} = no encoding; use bcrypt in production)
app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-256-bit-secret}
    expiry-seconds: ${JWT_EXPIRY_SECONDS:3600}
  idempotency:
    ttl: PT24H
    cleanup-cron: ${IDEMPOTENCY_CLEANUP_CRON:0 0 2 * * *}
  security:
    users:
      - username: admin
        password: "{noop}admin"
        roles:
          - ADMIN
      - username: merchant
        password: "{noop}merchant"
        owner-ref: merchant-acme
        roles:
          - MERCHANT
      - username: merchant-other
        password: "{noop}merchant"
        owner-ref: other-owner
        roles:
          - MERCHANT
      - username: auditor
        password: "{noop}auditor"
        roles:
          - AUDITOR
  rate-limit:
    requests-per-minute: ${RATE_LIMIT_RPM:100}
  reconcile:
    cron: ${RECONCILE_CRON:0 5 0 * * *}

# Shown by GET /actuator/info (build.* from spring-boot-maven-plugin build-info goal)
info:
  application:
    name: ${spring.application.name}
    description: Mini Payment Gateway

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  health:
    db:
      enabled: true
  info:
    env:
      enabled: true

---
# Docker Compose: DB host is service name `postgres`
spring:
  config:
    activate:
      on-profile: docker
  docker:
    compose:
      enabled: false
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/paygateway}
