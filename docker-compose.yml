# PRD §10.1 — nginx (TLS) → app (Spring Boot) → PostgreSQL 15
# Dev TLS: generate certs once (see docker/nginx/README.md), then: docker compose up --build

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: paygateway
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgsecret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pguser -d paygateway"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/paygateway
      DB_USERNAME: pguser
      DB_PASSWORD: pgsecret
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-use-256-bit-secret-in-prod}
      JWT_EXPIRY_SECONDS: ${JWT_EXPIRY_SECONDS:-3600}
      RATE_LIMIT_RPM: ${RATE_LIMIT_RPM:-100}
      RECONCILE_CRON: ${RECONCILE_CRON:-0 5 0 * * *}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      app:
        condition: service_healthy

volumes:
  pgdata:
